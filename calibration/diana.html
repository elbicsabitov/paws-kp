росить у более понравившихся кандидатов видео-обзор квартиры\n\nТакже перед оказанием услуги заключается договор публичной оферты [URL]https://paws.kz/publicoffer[/URL]\nОн регламентирует ответственность всех сторон, в том числе зоопомощника во время оказания услуги.\n\nБудем рады быть полезными в будущем🧡🐾", "service": "передержка", "phase": "01_qualification", "intent_class": "SALES", "source_date": "2026-02-20"}, {"id": 13, "client_msg": "Здравствуйте 👋\nУслуга для вашего питомца подошла к концу 🐾\n\nНам очень важно ваше мнение. Расскажите, пожалуйста:\n\n✨ Всё ли вам понравилось в работе сервиса?\n\n✨ Как вам работа зоопомощника?\n\n✨ Как вы впервые узнали о нас?\nНапример: увидели рекламу или пост в Instagram, нашли нашу страницу/сайт через поиск (Google/Яндекс), увидели упоминание у блогера/в сторис у знакомых, вам порекомендовали друзья или коллеги — или любой другой способ (можно своими словами).\n\nВаши ответы помогут нам стать лучше и ещё больше радовать вас и ваших питомцев.\n\nВ знак благодарности за все ответы на вопросы выше с упоминанием имени зоопомощника мы подарим скидку на 700 тенге для следующего заказа! 🎁\n\nСпасибо, что выбрали нас! Ждём ваш отклик 💌", "manager_response": "Добрый вечер! Стоимость передержки на даты 03.02. - 07.02 будет составлять 48 800 тг. Мы можем оформить заявку, но, к сожалению, не можем гарантировать, что успеем найти зоопомощника в такие сжатые сроки. Подскажите, до скольки вам нужно отвезти Тимошу?", "service": "передержка", "phase": "02_pricing", "intent_class": "GREETING", "source_date": "2026-02-03"}, {"id": 14, "client_msg": "12 июня только вечером, в последний день (18 июня) только утро", "manager_response": "Стоимость 12 визитов зооняни на даты 12.06-18.06 составит 54 600 тг💕\n\nУточним у Арайлым сможет ли она взять ваш заказ и вернемся к вам с ответом чуть позже😊", "service": "зооняня", "phase": "02_pricing", "intent_class": "SALES", "source_date": "2025-06-08"}, {"id": 15, "client_msg": "Здравствуйте 👋\nУслуга для вашего питомца подошла к концу 🐾\n\nНам очень важно ваше мнение. Расскажите, пожалуйста:\n✨ Всё ли вам понравилось в работе сервиса?\n✨ Как вам работа зоопомощника?\n✨ Как вы узнали о нас?\n\nВаши ответы помогут нам стать лучше и ещё больше радовать вас и ваших питомцев.\n\nВ знак благодарности за вашу обратную связь мы подарим промокод на 700 тенге для следующего заказа! 🎁\n\nСпасибо, что выбрали нас! Ждём ваш отклик 💌", "manager_response": "4 900 х 7 = 34 300 тг. \n34 300 х 1,05 (надбавка 15% - скидка 10% = надбавка 5%) = 36 015 тг. \nДалее стоимость округляется до сотни. \n\nЖду ответ от руководства, вернусь к вам чуть позже 🙌", "service": "зооняня", "phase": "02_pricing", "intent_class": "GREETING", "source_date": "2025-12-12"}, {"id": 16, "client_msg": ">>Это Paws.kz 🐾 Уезжаете или заняты на работе?\n>>У нас передержка, зооняня, выгул - с фотоотчётами и без клеток. Дарим вам скидку:\n>>\n>>• Передержка/няня — 10% от 10 дней, 15% от 20 дней, 20% от 30 дней\n>>• Выгул — 10% от 10 выгулов, 15% от 20 выгулов, 20% от 30 выгулов\n>>\n>>Алматы / Астана. Ответьте «СКИДКА», подберём зоопомощника и забронируем за вами цены\n \n \nДобрый день \nКакие у вас сейчас расценки на выгулы собак?", "manager_response": "Здравствуйте🧡\nМеня зовут Диана, и я являюсь менеджером сервиса заботы о питомцах Paws 🐾\n\nСтоимость выгула 30 мин - 4500 тг\nВыгул 1 час - 5300 тг\n\nВыгул 30 мин + мытье лап/кормление - 5300 тг\nВыгул 1 час + мытье лап/кормление - 6500 тг", "service": "выгул", "phase": "02_pricing", "intent_class": "SALES", "source_date": "2025-09-26"}, {"id": 17, "client_msg": "Извините мне не больше не надо", "manager_response": "Хорошо, будем рады помочь в следующий раз 🧡", "service": "зооняня", "phase": "01_qualification", "intent_class": "SALES", "source_date": "2026-01-20"}, {"id": 18, "client_msg": "Вы можете сразу написать то что даты не так важно", "manager_response": "Да, мы укажем в заявке, что график гибкий, но для оформления нужно указать хотя бы примерные даты. О // STATE

const STORAGE_KEY = "paws_calibration_state_v1";

const State = {
  data: null,

  init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        this.data = JSON.parse(saved);
        // Sanity check pair count + annotator match
        if (this.data.n_pairs !== N_PAIRS || this.data.annotator !== ANNOTATOR) {
          throw new Error("State mismatch");
        }
      } catch (e) {
        console.warn("Reset state:", e.message);
        this.reset();
      }
    } else {
      this.reset();
    }
  },

  reset() {
    this.data = {
      version: 1,
      annotator: ANNOTATOR,
      n_pairs: N_PAIRS,
      started_at: null,
      completed_at: null,
      current_index: 0,
      labels: {},      // {pair_id: {criterion_id: PASS|FAIL|N/A, confidence: 1-3, comment: "", time_spent_s: number}}
      view_started_at: {} // {pair_id: timestamp}
    };
    this.save();
  },

  save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data));
  },

  start() {
    if (!this.data.started_at) {
      this.data.started_at = Date.now();
      this.save();
    }
  },

  setLabel(pairId, criterionId, value) {
    if (!this.data.labels[pairId]) this.data.labels[pairId] = { criteria: {}, confidence: null, comment: "", time_spent_s: 0 };
    this.data.labels[pairId].criteria[criterionId] = value;
    this.save();
  },

  setConfidence(pairId, level) {
    if (!this.data.labels[pairId]) this.data.labels[pairId] = { criteria: {}, confidence: null, comment: "", time_spent_s: 0 };
    this.data.labels[pairId].confidence = level;
    this.save();
  },

  setComment(pairId, comment) {
    if (!this.data.labels[pairId]) this.data.labels[pairId] = { criteria: {}, confidence: null, comment: "", time_spent_s: 0 };
    this.data.labels[pairId].comment = comment;
    this.save();
  },

  recordView(pairId) {
    this.data.view_started_at[pairId] = Date.now();
    this.save();
  },

  recordTimeSpent(pairId) {
    if (this.data.view_started_at[pairId]) {
      const seconds = Math.round((Date.now() - this.data.view_started_at[pairId]) / 1000);
      const existing = this.data.labels[pairId] || { criteria: {}, confidence: null, comment: "", time_spent_s: 0 };
      existing.time_spent_s = (existing.time_spent_s || 0) + seconds;
      this.data.labels[pairId] = existing;
      delete this.data.view_started_at[pairId];
      this.save();
    }
  },

  isPairComplete(pairId) {
    const label = this.data.labels[pairId];
    if (!label) return false;
    if (!label.confidence) return false;
    if (Object.keys(label.criteria).length !== CRITERIA.length) return false;
    // If any FAIL → comment required
    const hasFail = Object.values(label.criteria).some(v => v === "FAIL");
    if (hasFail && (!label.comment || label.comment.trim().length < 3)) return false;
    return true;
  },

  countComplete() {
    return PAIRS.filter(p => this.isPairComplete(p.id)).length;
  },

  goNext() {
    if (this.data.current_index < N_PAIRS - 1) {
      this.data.current_index += 1;
      this.save();
      return true;
    }
    return false;
  },

  goPrev() {
    if (this.data.current_index > 0) {
      this.data.current_index -= 1;
      this.save();
      return true;
    }
    return false;
  },

  jumpTo(index) {
    if (index >= 0 && index < N_PAIRS) {
      this.data.current_index = index;
      this.save();
    }
  },

  finish() {
    this.data.completed_at = Date.now();
    this.save();
  }
};

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function escapeHtml(str) {
  if (str === null || str === undefined) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function sectionForIndex(idx) {
  return Math.floor(idx / SECTION_SIZE) + 1;
}

function renderProgressBar() {
  const completed = State.countComplete();
  const percent = Math.round((completed / N_PAIRS) * 100);
  const currentSection = sectionForIndex(State.data.current_index);
  const sectionDots = Array.from({length: N_SECTIONS}, (_, i) => {
    const sectionNum = i + 1;
    const sectionStart = i * SECTION_SIZE;
    const sectionEnd = Math.min(sectionStart + SECTION_SIZE, N_PAIRS);
    const sectionComplete = PAIRS.slice(sectionStart, sectionEnd).every(p => State.isPairComplete(p.id));
    const isCurrent = sectionNum === currentSection;
    const cls = sectionComplete ? "complete" : (isCurrent ? "current" : "");
    return `<div class="section-dot w-2.5 h-2.5 rounded-full bg-stone-300 ${cls}" title="Секция ${sectionNum}"></div>`;
  }).join("");

  const elapsed = State.data.started_at ? Math.round((Date.now() - State.data.started_at) / 1000) : 0;
  const estimatedRemaining = completed > 0
    ? Math.round((elapsed / completed) * (N_PAIRS - completed))
    : null;

  return `
    <div class="sticky top-0 bg-stone-50/95 backdrop-blur z-10 border-b border-stone-200 -mx-4 sm:-mx-6 px-4 sm:px-6 py-3 mb-6">
      <div class="max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-3">
            <span class="text-sm font-semibold text-stone-900">${completed}/${N_PAIRS}</span>
            <span class="text-xs text-stone-500">·</span>
            <span class="text-xs text-stone-600">Секция ${currentSection}/${N_SECTIONS}</span>
            ${estimatedRemaining ? `<span class="text-xs text-stone-500">·</span><span class="text-xs text-stone-600">осталось ~${formatTime(estimatedRemaining)}</span>` : ''}
          </div>
          <div class="flex items-center gap-1.5">${sectionDots}</div>
        </div>
        <div class="h-2 bg-stone-200 rounded-full overflow-hidden">
          <div class="progress-bar h-full bg-gradient-to-r from-blue-500 to-emerald-500 rounded-full" style="width: ${percent}%"></div>
        </div>
      </div>
    </div>
  `;
}

function renderSectionBreak(sectionJustCompleted) {
  return `
    <div class="fade-in bg-white rounded-2xl shadow-sm border border-stone-200 p-8 sm:p-12 mt-6">
      <div class="text-center">
        <div class="text-5xl mb-4">✨</div>
        <h2 class="text-2xl font-bold text-stone-900 mb-2">Секция ${sectionJustCompleted}/${N_SECTIONS} готова</h2>
        <p class="text-stone-600 mb-8">Хороший момент для перерыва. Прогресс сохранён.</p>

        <div class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
          <button onclick="onContinueAfterBreak()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-6 py-3 rounded-xl shadow-sm transition">▶️ Продолжить</button>
          <button onclick="onPause()" class="flex-1 px-6 py-3 rounded-xl border border-stone-300 hover:bg-stone-100 transition text-stone-700 font-medium">☕ Пауза</button>
        </div>
      </div>
    </div>
  `;
}

function renderPair() {
  const idx = State.data.current_index;
  const pair = PAIRS[idx];
  const label = State.data.labels[pair.id] || { criteria: {}, confidence: null, comment: "", time_spent_s: 0 };
  const hasFail = Object.values(label.criteria).some(v => v === "FAIL");
  const allCriteriaSelected = Object.keys(label.criteria).length === CRITERIA.length;
  const commentRequired = hasFail && (!label.comment || label.comment.trim().length < 3);

  const criteriaHtml = CRITERIA.map((c, i) => {
    const value = label.criteria[c.id] || null;
    const passSelected = value === "PASS" ? "selected-pass" : "";
    const failSelected = value === "FAIL" ? "selected-fail" : "";
    const naSelected = value === "N/A" ? "selected-na" : "";
    return `
      <div class="border border-stone-200 rounded-xl p-4 bg-white">
        <div class="flex items-start gap-3 mb-3">
          <div class="bg-stone-100 text-stone-700 font-semibold rounded-lg w-7 h-7 flex items-center justify-center text-sm flex-shrink-0">${i+1}</div>
          <div class="flex-1">
            <div class="font-semibold text-stone-900">${escapeHtml(c.title)}</div>
            <div class="text-sm text-stone-600 mt-0.5">${escapeHtml(c.question)}</div>
          </div>
          <details class="ml-2">
            <summary class="text-xs text-blue-600 hover:text-blue-700 select-none">примеры <span class="chevron">›</span></summary>
            <div class="absolute right-0 mt-1 w-80 bg-white rounded-lg shadow-lg border border-stone-200 p-4 text-sm z-20">
              <div class="text-emerald-700 mb-2"><strong>✅ PASS:</strong> ${escapeHtml(c.pass_example)}</div>
              <div class="text-red-700 mb-2"><strong>❌ FAIL:</strong> ${escapeHtml(c.fail_example)}</div>
              <div class="text-stone-600"><strong>⚪ N/A:</strong> ${escapeHtml(c.na_example)}</div>
            </div>
          </details>
        </div>
        <div class="flex gap-2">
          <button onclick="onCriterion('${c.id}', 'PASS')" class="criterion-button ${passSelected} flex-1 px-4 py-2.5 rounded-lg border border-stone-300 font-medium text-sm hover:border-stone-400">✅ PASS</button>
          <button onclick="onCriterion('${c.id}', 'FAIL')" class="criterion-button ${failSelected} flex-1 px-4 py-2.5 rounded-lg border border-stone-300 font-medium text-sm hover:border-stone-400">❌ FAIL</button>
          <button onclick="onCriterion('${c.id}', 'N/A')"  class="criterion-button ${naSelected}   flex-1 px-4 py-2.5 rounded-lg border border-stone-300 font-medium text-sm hover:border-stone-400">⚪ N/A</button>
        </div>
      </div>
    `;
  }).join("");

  const confidenceHtml = [1, 2, 3].map(level => {
    const sel = label.confidence === level ? "selected-pass" : "";
    const lbl = level === 1 ? "уверена" : level === 2 ? "сомневаюсь" : "критерий неясен";
    return `<button onclick="onConfidence(${level})" class="criterion-button ${sel} flex-1 px-4 py-2 rounded-lg border border-stone-300 text-sm font-medium hover:border-stone-400"><strong>${level}</strong> · ${lbl}</button>`;
  }).join("");

  // Compute view time + min-view gate
  const viewStarted = State.data.view_started_at[pair.id] || Date.now();
  const viewSecondsThisSession = Math.floor((Date.now() - viewStarted) / 1000);
  const totalViewSeconds = (label.time_spent_s || 0) + viewSecondsThisSession;
  const minViewMet = totalViewSeconds >= MIN_VIEW_SECONDS;

  const canSubmit = allCriteriaSelected && label.confidence && !commentRequired && minViewMet;

  return `
    <div class="fade-in pair-card bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden mb-6">
      <div class="p-5 sm:p-6 border-b border-stone-200 bg-stone-50">
        <div class="flex items-center justify-between text-xs text-stone-500 mb-2">
          <span class="font-semibold text-stone-700">Пара ${idx + 1} из ${N_PAIRS}</span>
          <span><span class="timer">${formatTime(totalViewSeconds)}</span> на этой паре</span>
        </div>
        <div class="flex flex-wrap gap-2 text-xs">
          <span class="bg-stone-200 text-stone-700 px-2 py-0.5 rounded">${escapeHtml(pair.service)}</span>
          <span class="bg-stone-200 text-stone-700 px-2 py-0.5 rounded">${escapeHtml(pair.phase)}</span>
          <span class="bg-stone-200 text-stone-700 px-2 py-0.5 rounded">${escapeHtml(pair.intent_class)}</span>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 divide-y lg:divide-y-0 lg:divide-x divide-stone-200">
        <div class="p-5 sm:p-6">
          <div class="text-xs font-semibold text-stone-500 uppercase tracking-wide mb-2">💬 Клиент написал:</div>
          <div class="text-stone-900 whitespace-pre-wrap leading-relaxed">${escapeHtml(pair.client_msg) || '<span class="text-stone-400 italic">(пусто)</span>'}</div>
        </div>
        <div class="p-5 sm:p-6 bg-blue-50/30">
          <div class="text-xs font-semibold text-stone-500 uppercase tracking-wide mb-2">👤 Менеджер ответил:</div>
          <div class="text-stone-900 whitespace-pre-wrap leading-relaxed">${escapeHtml(pair.manager_response) || '<span class="text-stone-400 italic">(пусто)</span>'}</div>
        </div>
      </div>

      <div class="p-5 sm:p-6 space-y-3 bg-stone-50/50 border-t border-stone-200">
        <div class="text-sm font-semibold text-stone-700 mb-1">Оценить ответ менеджера по 5 критериям:</div>
        ${criteriaHtml}
      </div>

      <div class="p-5 sm:p-6 border-t border-stone-200">
        <div class="text-sm font-semibold text-stone-700 mb-2">Уверенность в оценке</div>
        <div class="flex gap-2 mb-4">${confidenceHtml}</div>

        <div>
          <label class="text-sm font-semibold text-stone-700">Комментарий ${hasFail ? '<span class="text-red-600">*обязателен на FAIL</span>' : '<span class="text-stone-400">(опционально)</span>'}</label>
          <textarea
            id="comment-input"
            oninput="onCommentInput(this.value)"
            placeholder="${hasFail ? 'Почему FAIL? 1-2 строки...' : 'Если случай interesting — 1-2 строки...'}"
            class="mt-1 w-full border border-stone-300 rounded-lg p-3 text-sm focus:border-blue-500"
            rows="2">${escapeHtml(label.comment)}</textarea>
        </div>
      </div>

      <div class="p-5 sm:p-6 border-t border-stone-200 bg-stone-50">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <button onclick="onPrev()" ${idx === 0 ? 'disabled' : ''} class="px-5 py-2.5 rounded-lg border border-stone-300 text-stone-700 font-medium hover:bg-stone-100 transition disabled:opacity-40 disabled:cursor-not-allowed">← Назад</button>

          <div class="text-xs text-stone-500">
            ${!minViewMet ? `⏱ <span class="timer">${MIN_VIEW_SECONDS - totalViewSeconds}s</span> до разблокировки` : ''}
            ${!allCriteriaSelected ? '· оценить все 5' : ''}
            ${!label.confidence ? '· уверенность' : ''}
            ${commentRequired ? '· комментарий на FAIL' : ''}
          </div>

          <button onclick="onNext()" ${!canSubmit ? 'disabled' : ''} class="px-6 py-2.5 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white font-semibold transition disabled:opacity-40 disabled:cursor-not-allowed disabled:bg-stone-400">
            ${idx === N_PAIRS - 1 ? 'Финиш →' : 'Дальше →'}
          </button>
        </div>
      </div>
    </div>

    <div class="text-center text-xs text-stone-500">
      <button onclick="onPause()" class="hover:text-stone-700 underline">☕ Пауза и продолжить позже</button>
    </div>
  `;
}

function renderFinish() {
  const completed = State.countComplete();
  const totalTime = State.data.started_at ? Math.round((Date.now() - State.data.started_at) / 1000) : 0;
  const allConfidence = PAIRS.map(p => State.data.labels[p.id]?.confidence).filter(Boolean);
  const conf1 = allConfidence.filter(c => c === 1).length;
  const conf2 = allConfidence.filter(c => c === 2).length;
  const conf3 = allConfidence.filter(c => c === 3).length;
  const totalFails = PAIRS.reduce((sum, p) => {
    const lbl = State.data.labels[p.id];
    if (!lbl) return sum;
    return sum + Object.values(lbl.criteria).filter(v => v === "FAIL").length;
  }, 0);

  const submitState = State.data.submit_state || {status: "idle"};
  const submittedAt = State.data.submitted_at;

  let actionPanel = "";
  if (submitState.status === "success") {
    actionPanel = `
      <div class="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-6 mb-4 text-center">
        <div class="text-4xl mb-2">✅</div>
        <h3 class="text-xl font-bold text-emerald-900 mb-1">Ответ получен</h3>
        <p class="text-sm text-emerald-800">Отправлено ${new Date(submittedAt).toLocaleString('ru-RU')} · файл <code class="bg-emerald-100 px-1.5 py-0.5 rounded">${escapeHtml(submitState.saved_as || '—')}</code></p>
        <p class="text-sm text-emerald-800 mt-2">Можно закрыть вкладку. Спасибо! 🐾</p>
      </div>
      <div class="flex justify-center">
        <button onclick="onDownloadBackup()" class="text-sm px-4 py-2 rounded-lg border border-stone-300 hover:bg-stone-100 transition text-stone-700">⬇ Скачать копию (на всякий случай)</button>
      </div>
    `;
  } else if (submitState.status === "sending") {
    actionPanel = `
      <div class="bg-blue-50 border border-blue-200 rounded-xl p-6 mb-4 text-center">
        <div class="text-4xl mb-2 animate-pulse">📡</div>
        <h3 class="text-xl font-bold text-blue-900 mb-1">Отправляю ответ...</h3>
        <p class="text-sm text-blue-800">Если зависло > 30 секунд — попробуй ещё раз или скачай файл вручную</p>
      </div>
    `;
  } else if (submitState.status === "error") {
    actionPanel = `
      <div class="bg-amber-50 border border-amber-300 rounded-xl p-6 mb-4">
        <div class="flex items-start gap-3">
          <div class="text-3xl">⚠</div>
          <div class="flex-1">
            <h3 class="text-lg font-bold text-amber-900 mb-1">Не удалось отправить автоматически</h3>
            <p class="text-sm text-amber-800 mb-3">Ошибка: <code class="bg-amber-100 px-1.5 py-0.5 rounded text-xs">${escapeHtml(submitState.error || 'unknown')}</code></p>
            <p class="text-sm text-amber-900"><strong>Что делать:</strong> скачай файл ниже и отправь в чат. Прогресс не теряется.</p>
          </div>
        </div>
      </div>
      <div class="flex flex-col sm:flex-row gap-3">
        <button onclick="onDownloadBackup()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-6 py-4 rounded-xl shadow-sm transition text-lg">⬇ Скачать .json (отправь в TG)</button>
        <button onclick="onSubmit()" class="px-6 py-4 rounded-xl border border-stone-300 hover:bg-stone-100 transition text-stone-700 font-medium">🔁 Попробовать ещё раз</button>
      </div>
    `;
  } else {
    // idle / first time on finish screen
    actionPanel = `
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-5 mb-6">
        <h3 class="font-semibold text-blue-900 mb-2">📤 Готово к отправке</h3>
        <p class="text-sm text-blue-900">Нажми кнопку ниже — твой ответ автоматически сохранится автоматически. Никаких файлов скачивать не нужно.</p>
      </div>
      <div class="flex flex-col sm:flex-row gap-3">
        <button onclick="onSubmit()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-6 py-4 rounded-xl shadow-sm transition text-lg">📤 Отправить и завершить</button>
        <button onclick="State.data.current_index = 0; State.save(); render();" class="px-6 py-4 rounded-xl border border-stone-300 hover:bg-stone-100 transition text-stone-700 font-medium">↩️ Просмотреть пары</button>
      </div>
      <div class="mt-3 text-center">
        <button onclick="onDownloadBackup()" class="text-xs text-stone-500 hover:text-stone-700 underline">или скачать .json вручную</button>
      </div>
    `;
  }

  return `
    <div class="fade-in bg-white rounded-2xl shadow-sm border border-stone-200 p-8 sm:p-12 mt-12">
      <div class="text-center mb-8">
        <div class="text-6xl mb-4">🎉</div>
        <h1 class="text-3xl sm:text-4xl font-bold text-stone-900 mb-2">Готово!</h1>
        <p class="text-lg text-stone-600">${completed}/${N_PAIRS} пар оценены за ${formatTime(totalTime)}</p>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8">
        <div class="bg-stone-50 rounded-xl p-4 text-center">
          <div class="text-2xl font-bold text-emerald-700">${conf1}</div>
          <div class="text-xs text-stone-600 mt-1">уверена (1)</div>
        </div>
        <div class="bg-stone-50 rounded-xl p-4 text-center">
          <div class="text-2xl font-bold text-amber-700">${conf2}</div>
          <div class="text-xs text-stone-600 mt-1">сомневаюсь (2)</div>
        </div>
        <div class="bg-stone-50 rounded-xl p-4 text-center">
          <div class="text-2xl font-bold text-stone-600">${conf3}</div>
          <div class="text-xs text-stone-600 mt-1">критерий неясен (3)</div>
        </div>
        <div class="bg-stone-50 rounded-xl p-4 text-center">
          <div class="text-2xl font-bold text-red-700">${totalFails}</div>
          <div class="text-xs text-stone-600 mt-1">FAILов всего</div>
        </div>
      </div>

      ${actionPanel}

      <div class="mt-8 pt-6 border-t border-stone-200 text-xs text-stone-500 text-center">
        Если что-то пошло не так — пиши в чат. Прогресс в браузере сохраняется.
      </div>
    </div>
  `;
}

// ============================================================
// HANDLERS
// ============================================================

let viewTimer = null;

function render() {
  const app = document.getElementById('app');
  let html = "";

  if (State.data.completed_at) {
    html = renderFinish();
  } else if (!State.data.started_at) {
    html = renderWelcome();
  } else {
    // Check if we just completed a section
    const idx = State.data.current_index;
    const justCompletedSectionIdx = idx % SECTION_SIZE === 0 && idx > 0;
    const sectionPrevComplete = idx > 0 ? PAIRS.slice((sectionForIndex(idx - 1) - 1) * SECTION_SIZE, sectionForIndex(idx - 1) * SECTION_SIZE).every(p => State.isPairComplete(p.id)) : false;

    html = renderProgressBar();
    if (justCompletedSectionIdx && sectionPrevComplete && !sessionState.skipBreak) {
      html += renderSectionBreak(sectionForIndex(idx - 1));
    } else {
      html += renderPair();
    }
  }

  app.innerHTML = html;

  // Record view start for current pair (if on pair view)
  if (State.data.started_at && !State.data.completed_at) {
    const idx = State.data.current_index;
    const pair = PAIRS[idx];
    if (pair && !State.data.view_started_at[pair.id]) {
      State.recordView(pair.id);
    }
    scheduleMinViewUnlock();
  }
  sessionState.skipBreak = false;
}

const sessionState = {
  skipBreak: false  // set true when continuing past a section break
};

function onStart() {
  State.start();
  render();
  // Single setTimeout to re-render at min-view threshold so Next button unlocks.
  // No 1s interval (would steal textarea focus during typing).
  scheduleMinViewUnlock();
}

function scheduleMinViewUnlock() {
  if (viewTimer) clearTimeout(viewTimer);
  if (State.data.completed_at || !State.data.started_at) return;
  const idx = State.data.current_index;
  const pair = PAIRS[idx];
  if (!pair) return;
  const label = State.data.labels[pair.id] || { time_spent_s: 0 };
  const viewStarted = State.data.view_started_at[pair.id] || Date.now();
  const totalSec = (label.time_spent_s || 0) + Math.floor((Date.now() - viewStarted) / 1000);
  const remainingMs = (MIN_VIEW_SECONDS - totalSec) * 1000;
  if (remainingMs > 0) {
    viewTimer = setTimeout(() => render(), remainingMs);
  }
}

function onResetConfirm() {
  if (confirm("Сбросить весь прогресс и начать заново? Это нельзя отменить.")) {
    State.reset();
    render();
  }
}

function onCriterion(criterionId, value) {
  const idx = State.data.current_index;
  const pair = PAIRS[idx];
  State.setLabel(pair.id, criterionId, value);
  render();
}

function onConfidence(level) {
  const idx = State.data.current_index;
  const pair = PAIRS[idx];
  State.setConfidence(pair.id, level);
  render();
}

function onCommentInput(value) {
  const idx = State.data.current_index;
  const pair = PAIRS[idx];
  State.setComment(pair.id, value);
  // Don't full re-render on every keystroke — just save state
  // But update the disabled state of "Next" button
  const labelData = State.data.labels[pair.id];
  if (labelData && State.isPairComplete(pair.id)) {
    // re-render only Next button state  ; for simplicity full render but preserve focus on textarea
    const pos = document.activeElement?.selectionStart;
    render();
    const ta = document.getElementById('comment-input');
    if (ta && pos != null) {
      ta.focus();
      ta.setSelectionRange(pos, pos);
    }
  }
}

function onNext() {
  const idx = State.data.current_index;
  const pair = PAIRS[idx];
  State.recordTimeSpent(pair.id);
  if (!State.goNext()) {
    State.finish();
  }
  render();
}

function onPrev() {
  const idx = State.data.current_index;
  const pair = PAIRS[idx];
  State.recordTimeSpent(pair.id);
  State.goPrev();
  sessionState.skipBreak = true;
  render();
}

function onContinueAfterBreak() {
  sessionState.skipBreak = true;
  render();
}

function onPause() {
  alert("Прогресс сохранён в этом браузере. Просто закрой вкладку и вернись когда удобно — откроешь файл и продолжишь.");
}

async function onSubmit() {
  const idx = State.data.current_index;
  if (PAIRS[idx]) State.recordTimeSpent(PAIRS[idx].id);

  State.data.submit_state = {status: "sending"};
  State.save();
  render();

  try {
    const annotatorSlug = ANNOTATOR.toLowerCase();
    const url = `${SUBMIT_ENDPOINT}/${annotatorSlug}`;
    const response = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Calibration-Token": SUBMIT_TOKEN,
      },
      body: JSON.stringify(State.data),
    });

    if (!response.ok) {
      const text = await response.text();
      State.data.submit_state = {status: "error", error: `HTTP ${response.status}: ${text.slice(0, 200)}`};
      State.save();
      render();
      return;
    }

    const data = await response.json();
    State.data.submit_state = {status: "success", saved_as: data.saved_as, received_pairs: data.received_pairs};
    State.data.submitted_at = Date.now();
    State.save();
    render();
  } catch (e) {
    State.data.submit_state = {status: "error", error: e.message || String(e)};
    State.save();
    render();
  }
}

function onDownloadBackup() {
  const idx = State.data.current_index;
  if (PAIRS[idx]) State.recordTimeSpent(PAIRS[idx].id);
  const blob = new Blob([JSON.stringify(State.data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = `paws_calibration_${ANNOTATOR.replace(/[^a-zA-Z0-9]/g, '_')}_${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Legacy alias (kept for any leftover refs)
const onExport = onDownloadBackup;

// ============================================================
// INIT
// ============================================================

State.init();
render();

// Save view-time on tab close
window.addEventListener('beforeunload', () => {
  const idx = State.data.current_index;
  if (PAIRS[idx]) State.recordTimeSpent(PAIRS[idx].id);
});

</script>
